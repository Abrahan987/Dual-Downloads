<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargador Multimedia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Descargador Multimedia</h1>
            <p>Descarga de todas tus plataformas favoritas en un solo lugar</p>
        </header>

        <div class="grid-platforms">
            <!-- YouTube -->
            <div class="platform-box">
                <h3>📺 YouTube</h3>
                <div class="form-group">
                    <input type="text" id="yt-url" placeholder="Enlace YouTube..." class="input-url">
                </div>
                <select id="yt-format" class="select-format">
                    <option value="mp3">🎵 MP3 (Audio)</option>
                    <option value="mp4-360">📹 MP4 360p</option>
                    <option value="mp4-720">📹 MP4 720p</option>
                    <option value="mp4-1080">📹 MP4 1080p</option>
                </select>
                <button class="btn-download" onclick="downloadYoutube()">Descargar</button>
                <div id="yt-result" class="result"></div>
            </div>

            <!-- TikTok -->
            <div class="platform-box">
                <h3>🎵 TikTok</h3>
                <div class="form-group">
                    <input type="text" id="tt-url" placeholder="Enlace TikTok..." class="input-url">
                </div>
                <button class="btn-download" onclick="downloadTiktok()">Descargar</button>
                <div id="tt-result" class="result"></div>
            </div>

            <!-- Instagram -->
            <div class="platform-box">
                <h3>📸 Instagram</h3>
                <div class="form-group">
                    <input type="text" id="ig-url" placeholder="Enlace Instagram..." class="input-url">
                </div>
                <button class="btn-download" onclick="downloadInstagram()">Descargar</button>
                <div id="ig-result" class="result"></div>
            </div>

            <!-- Twitter/X -->
            <div class="platform-box">
                <h3>𝕏 Twitter/X</h3>
                <div class="form-group">
                    <input type="text" id="tw-url" placeholder="Enlace X/Twitter..." class="input-url">
                </div>
                <button class="btn-download" onclick="downloadTwitter()">Descargar</button>
                <div id="tw-result" class="result"></div>
            </div>

            <!-- Facebook -->
            <div class="platform-box">
                <h3>👍 Facebook</h3>
                <div class="form-group">
                    <input type="text" id="fb-url" placeholder="Enlace Facebook..." class="input-url">
                </div>
                <button class="btn-download" onclick="downloadFacebook()">Descargar</button>
                <div id="fb-result" class="result"></div>
            </div>

            <!-- Xvideos -->
            <div class="platform-box">
                <h3>🔞 Xvideos</h3>
                <div class="form-group">
                    <input type="text" id="xv-url" placeholder="Enlace Xvideos..." class="input-url">
                </div>
                <button class="btn-download" onclick="downloadXvideos()">Descargar</button>
                <div id="xv-result" class="result"></div>
            </div>

            <!-- Pinterest -->
            <div class="platform-box">
                <h3>📌 Pinterest</h3>
                <div class="form-group">
                    <input type="text" id="pin-url" placeholder="Enlace Pinterest..." class="input-url">
                </div>
                <button class="btn-download" onclick="downloadPinterest()">Descargar</button>
                <div id="pin-result" class="result"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
